name: Build Seraj APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y unzip zip python3-pip
        pip install --upgrade pip
        pip install buildozer cython

    - name: Clean Buildozer cache
      run: |
        rm -rf ~/.buildozer

    - name: Prepare Buildozer
      run: |
        mkdir -p ~/.buildozer
        yes | buildozer android update

    - name: Build APK
      run: |
        yes | buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: seraj-apk
        path: bin/*.apk